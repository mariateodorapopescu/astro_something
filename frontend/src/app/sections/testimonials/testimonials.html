<section class="mx-auto max-w-7xl px-4 py-16 lg:py-20">
  <h2 class="text-center text-4xl font-extrabold tracking-tight text-gradient sm:text-5xl">
    What do our users say?
  </h2>
  <p class="mx-auto mt-4 max-w-2xl text-center text-lg text-slate-600 dark:text-slate-400">
    Hundreds of people have already ordered a full cosmic map report.
  </p>

  <div class="mt-14 grid gap-6 md:grid-cols-3">
    @for (r of reviews; track r.name) {
      <div class="rounded-3xl border border-slate-200/70 bg-white/70 p-7 shadow-sm
                  dark:border-white/10 dark:bg-white/5">
        <div class="text-amber-400">★★★★★</div>
        <p class="mt-4 italic text-slate-600 dark:text-slate-300">"{{ r.text }}"</p>
        <div class="mt-6 flex items-center gap-3">
          <span class="grid h-10 w-10 place-items-center rounded-full
                       bg-gradient-to-br font-bold text-white {{ r.color }}">{{ r.initial }}</span>
          <span>
            <span class="block font-semibold text-slate-900 dark:text-white">{{ r.name }}</span>
            <span class="block text-xs text-slate-500 dark:text-slate-400">{{ r.plan }}</span>
          </span>
        </div>
      </div>
    }
  </div>
</section>
