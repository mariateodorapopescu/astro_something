<section class="mx-auto max-w-4xl px-4 py-16 lg:py-20">
  <h2 class="text-center text-4xl font-extrabold tracking-tight text-gradient sm:text-5xl">
    {{ title() }}
  </h2>
  <div class="mx-auto mt-10 max-w-3xl space-y-6 text-center text-lg leading-relaxed
              text-slate-600 dark:text-slate-300">
    @for (p of paragraphs(); track $index) {
      <p>{{ p }}</p>
    }
  </div>
</section>
