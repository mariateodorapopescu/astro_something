<section id="features" class="mx-auto max-w-7xl px-4 py-16 lg:py-20">
  <h2 class="text-center text-4xl font-extrabold tracking-tight text-gradient sm:text-5xl">
    {{ title() }}
  </h2>
  <p class="mx-auto mt-4 max-w-2xl text-center text-lg text-slate-600 dark:text-slate-400">
    {{ subtitle() }}
  </p>

  <div class="mt-14 grid gap-6 md:grid-cols-2 lg:grid-cols-3">
    @for (card of cards(); track card.title) {
      <div class="rounded-3xl border border-slate-200/70 bg-white/70 p-8 text-center shadow-sm
                  transition hover:-translate-y-1 hover:shadow-xl
                  dark:border-white/10 dark:bg-white/5">
        <div class="mx-auto grid h-16 w-16 place-items-center rounded-full
                    bg-gradient-to-br text-2xl text-white {{ card.gradient }}">
          {{ card.icon }}
        </div>
        <h3 class="mt-5 text-xl font-bold text-violet-600 dark:text-violet-300">{{ card.title }}</h3>
        <p class="mt-3 text-slate-600 dark:text-slate-400">{{ card.text }}</p>
      </div>
    }
  </div>
</section>
