<section class="mx-auto max-w-4xl px-4 py-16 lg:py-20">
  <div class="text-center">
    <span class="mx-auto grid h-16 w-16 place-items-center rounded-2xl bg-violet-100 text-2xl dark:bg-violet-500/15">🔒</span>
    <h1 class="mt-6 text-4xl font-extrabold tracking-tight text-slate-900 dark:text-white sm:text-5xl">{{ title() }}</h1>
    <p class="mt-3 text-sm text-slate-500 dark:text-slate-400">Last updated: 2026</p>
  </div>

  @if (intro()) {
    <p class="mx-auto mt-10 max-w-2xl text-center text-lg leading-relaxed text-slate-600 dark:text-slate-300">
      {{ intro() }}
    </p>
  }

  <div class="mt-12 space-y-10">
    @for (s of sections(); track s.heading) {
      <div>
        <h2 class="border-b border-slate-200/70 pb-3 text-2xl font-bold text-slate-900 dark:border-white/10 dark:text-white">
          {{ s.heading }}
        </h2>
        @for (p of s.paragraphs; track $index) {
          <p class="mt-4 leading-relaxed text-slate-600 dark:text-slate-300">{{ p }}</p>
        }
      </div>
    }
  </div>

  <div class="mt-12 text-center">
    <a routerLink="/" class="inline-flex items-center gap-2 rounded-xl bg-gradient-to-r from-violet-600 to-pink-500
              px-6 py-3 font-semibold text-white hover:opacity-90">← Back to homepage</a>
  </div>
</section>
