<section class="mx-auto max-w-7xl px-4 py-16 lg:py-20">
  <h2 class="text-center text-4xl font-extrabold tracking-tight text-gradient sm:text-5xl">
    How does the calculator work?
  </h2>
  <p class="mx-auto mt-4 max-w-2xl text-center text-lg text-slate-600 dark:text-slate-400">
    Calculate your cosmic map in three simple steps — for free.
  </p>

  <div class="mt-14 grid gap-10 md:grid-cols-3">
    @for (step of steps; track step.n) {
      <div class="text-center">
        <div class="mx-auto grid h-16 w-16 place-items-center rounded-2xl
                    bg-gradient-to-br from-violet-500/20 to-pink-500/20 text-2xl font-bold text-violet-600
                    dark:text-violet-300">
          {{ step.n }}
        </div>
        <h3 class="mt-5 text-xl font-bold text-violet-600 dark:text-violet-300">{{ step.title }}</h3>
        <p class="mx-auto mt-3 max-w-xs text-slate-600 dark:text-slate-400">{{ step.text }}</p>
      </div>
    }
  </div>
</section>
