# Blueprint Render — descrie backend-ul + baza de date PostgreSQL.
# Pe https://render.com: New > Blueprint > alegi acest repo si Render
# citeste fisierul asta si creeaza totul automat.
#
# Dupa primul deploy, copiaza URL-ul serviciului (ex. https://astra-backend.onrender.com)
# si pune-l in frontend/netlify.toml (vezi comentariul de acolo).

databases:
  - name: astra-db
    databaseName: app_db
    user: app_user
    plan: free

services:
  - type: web
    name: astra-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      # Adresa bazei de date — completata automat din baza "astra-db" de mai sus.
      - key: DATABASE_URL
        fromDatabase:
          name: astra-db
          property: connectionString
      # Secretul JWT — generat automat de Render, sigur si lung.
      - key: JWT_SECRET
        generateValue: true
      # De unde acceptam cereri. Inlocuieste cu URL-ul tau real de Netlify
      # dupa ce deployezi frontend-ul (ex. https://astra-app.netlify.app).
      - key: CORS_ORIGINS
        value: https://YOUR-SITE.netlify.app
      # Versiunea de Python folosita la build.
      - key: PYTHON_VERSION
        value: "3.12.7"
